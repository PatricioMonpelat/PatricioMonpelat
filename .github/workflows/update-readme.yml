name: Update README daily

on:
  schedule:
      - cron: '0 12 * * *'  # Runs every day at 12:00 UTC (9:00 AM Argentina time)
        workflow_dispatch:        # Allows manual trigger from GitHub UI

        permissions:
          contents: write

          jobs:
            update-readme:
                runs-on: ubuntu-latest

                    steps:
                          - name: Checkout repository
                                  uses: actions/checkout@v4

                                        - name: Set up Python
                                                uses: actions/setup-python@v5
                                                        with:
                                                                  python-version: '3.11'

                                                                        - name: Install dependencies
                                                                                run: pip install requests pytz

                                                                                      - name: Update README
                                                                                              run: |
                                                                                                        python3 - <<'EOF'
                                                                                                                  import requests
                                                                                                                            import re
                                                                                                                                      from datetime import datetime
                                                                                                                                                import pytz
                                                                                                                                                
                                                                                                                                                          # ── 1. Fetch quote of the day ──────────────────────────────────
                                                                                                                                                                    try:
                                                                                                                                                                                  resp = requests.get("https://zenquotes.io/api/today", timeout=10)
                                                                                                                                                                                                data = resp.json()
                                                                                                                                                                                                              quote = data[0]["q"]
                                                                                                                                                                                                                            author = data[0]["a"]
                                                                                                                                                                                                                                          quote_text = f"> 💬 **Frase del día:** _{quote}_ — **{author}**"
                                                                                                                                                                                                                                                    except Exception as e:
                                                                                                                                                                                                                                                                  quote_text = "> 💬 **Frase del día:** _No se pudo obtener la frase hoy._"
                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                            # ── 2. Get current datetime in Argentina timezone ──────────────
                                                                                                                                                                                                                                                                                      tz = pytz.timezone("America/Argentina/Buenos_Aires")
                                                                                                                                                                                                                                                                                                now = datetime.now(tz)
                                                                                                                                                                                                                                                                                                          formatted = now.strftime("%d/%m/%Y %H:%M (UTC-3)")
                                                                                                                                                                                                                                                                                                                    updated_text = f"🕐 **Última actualización:** {formatted}"
                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                              # ── 3. Read README ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                        with open("README.md", "r", encoding="utf-8") as f:
                                                                                                                                                                                                                                                                                                                                                      content = f.read()
                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                # ── 4. Replace placeholders ────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                          content = re.sub(
                                                                                                                                                                                                                                                                                                                                                                                        r"<!-- QUOTE_START -->.*?<!-- QUOTE_END -->",
                                                                                                                                                                                                                                                                                                                                                                                                      f"<!-- QUOTE_START -->\n{quote_text}\n<!-- QUOTE_END -->",
                                                                                                                                                                                                                                                                                                                                                                                                                    content,
                                                                                                                                                                                                                                                                                                                                                                                                                                  flags=re.DOTALL
                                                                                                                                                                                                                                                                                                                                                                                                                                            )
                                                                                                                                                                                                                                                                                                                                                                                                                                                      content = re.sub(
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    r"<!-- LAST_UPDATED_START -->.*?<!-- LAST_UPDATED_END -->",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  f"<!-- LAST_UPDATED_START -->\n{updated_text}\n<!-- LAST_UPDATED_END -->",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                content,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              flags=re.DOTALL
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # ── 5. Write README ────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with open("README.md", "w", encoding="utf-8") as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          f.write(content)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    print(f"README updated: {formatted}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              print(f"Quote: {quote_text}")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Commit and push changes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    git add README.md
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              git diff --staged --quiet || git commit -m "chore: daily README update - $(date +'%d/%m/%Y')"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        git push
