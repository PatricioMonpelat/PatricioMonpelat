name: Update README

on:
  schedule:
    - cron: "0 12 * * *" # todos los días a las 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pytz

      - name: Run README updater
        run: |
          python update_readme.py

      - name: Commit and push changes as Patricio
        run: |
          git config user.name "PatricioMonpelat"
          git config user.email "patricio.monpelat@gmail.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update README daily quote"
            git push
          fi
